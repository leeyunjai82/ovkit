# Apache-2.0 detection models (DETR family) — SOURCE list for the mirror build.
# ---------------------------------------------------------------------------
# Curated, permissive (Apache-2.0) detectors with verified ONNX exports. These
# feed build_mirror.py; after mirroring, point the runtime manifest at the
# mirror. No AGPL model stacks — DETR family only (spec §7).
#
# NOTE: RT-DETRv2 / D-FINE entries were removed pending verified onnx-community
# repo ids (the guessed names 404'd). Broad detection coverage comes from the
# OMZ detectors mirrored via `--omz-intel`. Re-add here once repo ids are
# confirmed.
# ---------------------------------------------------------------------------

rtdetr_r101:
  src: hf
  repo: onnx-community/rtdetr_r101vd
  filename: onnx/model.onnx
  task: detect
  precision: fp16
  license: apache-2.0
  imgsz: 640
