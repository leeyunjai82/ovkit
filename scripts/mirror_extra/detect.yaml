# Apache-2.0 detection models (DETR family) — SOURCE list for the mirror build.
# ---------------------------------------------------------------------------
# Curated, permissive (Apache-2.0) detectors with easy ONNX exports. These feed
# build_mirror.py; after mirroring, point the runtime manifest at the mirror.
# No YOLO/Ultralytics (AGPL) — DETR family only (spec §7).
#
# ⚠ Repo ids / filenames follow the onnx-community export convention but should
# be confirmed with network access; build_mirror.py reports any that fail.
# ---------------------------------------------------------------------------

rtdetr_r101:
  src: hf
  repo: onnx-community/rtdetr_r101vd
  filename: onnx/model.onnx
  task: detect
  precision: fp16
  license: apache-2.0
  imgsz: 640

